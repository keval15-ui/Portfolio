<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Keval</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/scroll-fixes.css">
</head>
<body>
    <!-- Galaxy-style background with stars -->
    <div class="star-field">
        <div class="layer" id="stars1"></div>
        <div class="layer" id="stars2"></div>
        <div class="layer" id="stars3"></div>
    </div>
    
    <!-- Header with home link -->
    <header class="contact-header">
        <a href="index.html" class="home-link" id="back-to-home">
            <i class="fas fa-arrow-left"></i> <span>Back to Home</span>
        </a>
    </header>
    
    <!-- Main contact content -->
    <main class="contact-main">
        <!-- Contact header section -->
        <section class="contact-hero" data-animate="true" data-animation="fadeIn" data-delay="0.2">
            <h1 class="contact-title">Get in Touch</h1>
            <p class="contact-subtitle">I'd love to hear from you. Let's create something amazing together.</p>
        </section>
        
        <!-- Contact information and form -->
        <div class="contact-container">
            <!-- Contact information -->
            <section class="contact-info" data-animate="true" data-animation="fadeInLeft" data-delay="0.4">
                <div class="info-card">
                    <h2 class="section-heading">Contact Info</h2>
                    
                    <div class="contact-method">
                        <div class="contact-icon">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div class="contact-details">
                            <h3>Email</h3>
                            <p><a href="mailto:hello@keval.com">hello@keval.com</a></p>
                        </div>
                    </div>
                    
                    <div class="contact-method">
                        <div class="contact-icon">
                            <i class="fas fa-phone"></i>
                        </div>
                        <div class="contact-details">
                            <h3>Phone</h3>
                            <p><a href="tel:+1234567890">+1 (234) 567-890</a></p>
                        </div>
                    </div>
                    
                    <div class="contact-method">
                        <div class="contact-icon">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                        <div class="contact-details">
                            <h3>Location</h3>
                            <p>San Francisco, CA</p>
                        </div>
                    </div>
                    
                    <div class="social-links">
                        <a href="#" class="social-link" aria-label="LinkedIn">
                            <i class="fab fa-linkedin"></i>
                        </a>
                        <a href="#" class="social-link" aria-label="Twitter">
                            <i class="fab fa-twitter"></i>
                        </a>
                        <a href="#" class="social-link" aria-label="GitHub">
                            <i class="fab fa-github"></i>
                        </a>
                        <a href="#" class="social-link" aria-label="Dribbble">
                            <i class="fab fa-dribbble"></i>
                        </a>
                    </div>
                </div>
            </section>
            
            <!-- Contact form -->
            <section class="contact-form-section" data-animate="true" data-animation="fadeInRight" data-delay="0.6">
                <form id="contactForm" class="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                        <div class="form-field-highlight"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                        <div class="form-field-highlight"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" required>
                        <div class="form-field-highlight"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                        <div class="form-field-highlight"></div>
                    </div>
                    
                    <button type="submit" class="submit-btn">
                        <span class="btn-text">Send Message</span>
                        <span class="btn-icon"><i class="fas fa-paper-plane"></i></span>
                    </button>
                </form>
            </section>
        </div>
        
        <!-- Map section -->
        <section class="map-section" data-animate="true" data-animation="fadeIn" data-delay="0.8">
            <div class="map-container">
                <!-- Map placeholder - In a real project, you would integrate Google Maps or similar -->
                <div class="map-placeholder">
                    <div class="map-overlay">
                        <i class="fas fa-map-pin pulse"></i>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <footer class="contact-footer" data-animate="true" data-animation="fadeIn" data-delay="1.0">
        <p>&copy; 2025 Keval</p>
    </footer>
    
    <script src="cursor.js"></script>
    <script src="contact.js"></script>
    <script src="js/scroll-top.js"></script>
    <script>
        // Ensure we mark that the user has seen the intro when clicking back to home
        document.getElementById('back-to-home').addEventListener('click', function() {
            sessionStorage.setItem('hasSeenIntro', 'true');
        });
    </script>
</body>
</html>
